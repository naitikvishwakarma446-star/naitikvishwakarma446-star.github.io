<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naiteek Personal Cloud</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; rounded-radius: 12px; border-radius: 12px; max-w: 400px; w: 100%; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { color: #ffffff; margin-bottom: 8px; font-size: 24px; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
        input { w: 100%; width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { width: 100%; padding: 12px; background: #238636; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2ea043; }
        .err { color: #f85149; font-size: 13px; margin-top: 10px; display: none; }
        .hidden { display: none !important; }
        .dash-box { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; }
        .file-zone { border: 2px dashed #30363d; padding: 30px; border-radius: 8px; margin-top: 15px; cursor: pointer; text-align: center; color: #8b949e; }
        .file-zone:hover { border-color: #58a6ff; color: #fff; }
    </style>
</head>
<body>

    <!-- LOGIN PANEL -->
    <div id="login-box" class="card">
        <h2>Naiteek Cloud</h2>
        <p>Enter your master password</p>
        <input type="password" id="pass" placeholder="••••••••" onkeypress="handleEnter(event)">
        <button onclick="signMeIn()">Unlock Dashboard</button>
        <div id="error-msg" class="err">Galat Password Hai Bhai! ❌</div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dash-box" class="dash-box hidden">
        <h2 style="margin-bottom: 4px;">Naiteek Vishwakarma</h2>
        <p style="margin-bottom: 15px;">Personal Cloud Storage Dashboard</p>
        
        <div class="file-zone" onclick="document.getElementById('upload-trigger').click()">
            <input type="file" id="upload-trigger" class="hidden" onchange="startUpload()" multiple>
            <strong>Click here to upload files</strong>
            <div style="font-size: 12px; margin-top: 5px;">Photos, Videos, and Docs supported</div>
        </div>

        <div style="margin-top: 25px; text-align: left;">
            <h3 style="color: white; font-size: 16px; margin-bottom: 10px;">Your Files:</h3>
            <div id="file-view" style="color: #8b949e; font-size: 14px; padding: 10px; background: #0d1117; border-radius: 6px; text-align: center;">
                No files uploaded yet.
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dtcffohlfmhgyputihtj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Kl2H_9_G0q2m_hZs6UBX9w_gLsdR5Uf";
        const BUCKET = "my_files";

        function handleEnter(e) {
            if(e.key === 'Enter') signMeIn();
        }

        function signMeIn() {
            const p = document.getElementById('pass').value;
            if(p === "Naiteek@2026") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dash-box').classList.remove('hidden');
                syncFiles();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        async function syncFiles() {
            const view = document.getElementById('file-view');
            view.innerText = "Loading files from cloud...";
            
            try {
                const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prefix: "", limit: 100, sortBy: { column: "name", order: "asc" } })
                });
                
                const data = await res.json();
                if(!data || data.length === 0 || data.error) {
                    view.innerText = "Cloud storage empty. Ready for uploads!";
                    return;
                }

                view.innerHTML = "";
                data.forEach(f => {
                    const link = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${f.name}`;
                    const item = document.createElement('div');
                    item.style.cssText = "display: flex; justify-content: space-between; padding: 8px 0; border-b: 1px solid #30363d; margin-bottom: 5px;";
                    item.innerHTML = `<span style="color:white; max-width:70%; overflow:hidden; text-overflow:ellipsis;">📄 ${f.name}</span> <a href="${link}" target="_blank" style="color:#58a6ff; text-decoration:none;">View ↗</a>`;
                    view.appendChild(item);
                });
            } catch(err) {
                view.innerText = "Connected! Storage bucket setup pending.";
            }
        }

        async function startUpload() {
            const selector = document.getElementById('upload-trigger');
            if(!selector.files.length) return;
            
            const view = document.getElementById('file-view');
            view.innerText = "Uploading to cloud, please wait...";

            for(let file of selector.files) {
                try {
                    await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${file.name}`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        },
                        body: file
                    });
                } catch(e) {
                    console.error(e);
                }
            }
            syncFiles();
        }
    </script>
</body>
</html>
